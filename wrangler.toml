name = "standalone-comments-server"
main = "src/index.ts"
compatibility_date = "2026-07-04"

# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "comments-db"
database_id = "04b36ee2-0585-4ac4-8bf2-931c99142e02"  # Replace with actual D1 database ID after creation

# Environment variables
[vars]
APP_URL = "https://comments.ifard.ir"
ALLOWED_ORIGINS = "https://ifard.ir"
APP_LANGUAGE = "fa"
SESSION_LIFETIME = "2592000"  # 30 days in seconds

# Secrets (set via: wrangler secret put <SECRET_NAME>)
# - ADMIN_PASSWORD_HASH
# - EMAIL_API_KEY (optional, for email notifications)
#
# NOTE: the JWT_SECRET variable from the PHP version is no longer
# required — the Workers port uses opaque random session tokens, not
# JWTs, and the Auth class no longer reads env.JWT_SECRET.

# Cron triggers — drives the email-queue processor. Runs every 5
# minutes (the minimum interval allowed by Cloudflare Workers Cron
# Triggers). Without this, the email_queue table accumulates `pending`
# rows that are never sent.
#
# To disable email notifications entirely, comment out the line below
# AND set `enable_notifications = 'false'` in the admin settings panel.
[triggers]
crons = ["*/5 * * * *"]

# KV Binding for rate limiting (optional, can use D1 instead)
# [[kv_namespaces]]
# binding = "RATE_LIMIT"
# id = "your-kv-namespace-id"

# R2 Binding for file storage (optional, for future use)
# [[r2_buckets]]
# binding = "STORAGE"
# bucket_name = "comments-storage"
