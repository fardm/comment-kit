name = "standalone-comments-server"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "comments-db"
database_id = "your-database-id"  # Replace with actual D1 database ID after creation

# Environment variables
[vars]
APP_URL = "https://example.com/comments"
ALLOWED_ORIGINS = "https://example.com"
APP_LANGUAGE = "en"
SESSION_LIFETIME = "2592000"  # 30 days in seconds

# Secrets (set via: wrangler secret put <SECRET_NAME>)
# - ADMIN_PASSWORD_HASH
# - JWT_SECRET
# - EMAIL_API_KEY (optional, for email notifications)

# KV Binding for rate limiting (optional, can use D1 instead)
# [[kv_namespaces]]
# binding = "RATE_LIMIT"
# id = "your-kv-namespace-id"

# R2 Binding for file storage (optional, for future use)
# [[r2_buckets]]
# binding = "STORAGE"
# bucket_name = "comments-storage"
